<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); padding: 20px; }
        h1 { text-align: center; color: #333; }
        .operator-section { margin-top: 20px; }
        button { width: 100%; padding: 15px; font-size: 18px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; background: #f0f0f0; cursor: pointer; }
        button:hover { background: #e0e0e0; }
        .accessibility { display: flex; justify-content: space-between; }
        .accessible-button { background-color: #008CBA; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Calculator</h1>
        <div class="operator-section">
            <h2>Operators</h2>
            <button class="accessible-button" aria-label="Add">+</button>
            <button class="accessible-button" aria-label="Subtract">-</button>
            <button class="accessible-button" aria-label="Multiply">×</button>
            <button class="accessible-button" aria-label="Divide">÷</button>
        </div>
        <!-- Display and input sections can be added here -->
    </div>
</body>
</html>
